name: Build and publish ouestcharlie-toolkit

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-wheel:
    name: Build wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest      # macOS arm64
          - os: ubuntu-22.04      # Linux x86_64
          - os: windows-latest    # Windows x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm inih

      - name: Install nasm (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install nasm (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nasm -y --no-progress

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install hatch
        run: pip install hatch

      - name: Build wheel
        run: hatch build --target wheel
        env:
          IMAGE_PROC_FEATURE_RAW: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install hatch
        run: pip install hatch
      - name: Build sdist
        run: hatch build --target sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheel, build-sdist]
    runs-on: ubuntu-22.04
    environment: test-pypi
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true
