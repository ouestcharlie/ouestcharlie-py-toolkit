name: Build ouestcharlie-toolkit

on:
  pull_request:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run unit tests after building"
        type: boolean
        default: true

jobs:
  build-wheel:
    name: Build wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel    # macOS Intel
          - os: macos-latest      # macOS arm64
          - os: ubuntu-22.04      # Linux x86_64
          - os: windows-latest    # Windows x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm inih

      - name: Install nasm (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install nasm (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nasm -y --no-progress

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v6

      - name: Install build tools
        run: uv pip install --system hatch auditwheel

      - name: Build wheel
        run: hatch build --target wheel
        env:
          IMAGE_PROC_FEATURE_RAW: "1"

      - name: Install wheel and run tests
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_tests }}
        run: |
          pip install --find-links dist/ ouestcharlie-py-toolkit pytest pytest-asyncio
          python -m pytest tests/ -v

      - name: Repair wheel (Linux — retag linux_x86_64 → manylinux)
        if: runner.os == 'Linux'
        run: |
          auditwheel repair dist/*.whl -w dist/
          rm dist/*-linux_x86_64.whl

      - uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install hatch
        run: pip install hatch
      - name: Build sdist
        run: hatch build --target sdist
      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz
